<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }

#loader {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 28px; background: #000;
}
#loader-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: opacity .6s ease; opacity: 0;
}
.spinner {
  position: relative; z-index: 1;
  width: 72px; height: 72px;
  border: 5px solid rgba(255,255,255,.15);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader-text { position: relative; z-index: 1; font-size: .95rem; color: rgba(255,255,255,.6); letter-spacing: .04em; text-shadow: 0 1px 4px #000; }

#player { position: fixed; inset: 0; display: none; background: #000; }
video { width: 100%; height: 100%; display: block; }

#src-bar {
  position: fixed; top: 14px; right: 14px; z-index: 10;
  display: none; gap: 6px; align-items: center;
  background: rgba(0,0,0,.55); backdrop-filter: blur(8px);
  padding: 6px; border-radius: 10px; border: 1px solid rgba(255,255,255,.12);
}
#src-bar button {
  background: transparent; color: rgba(255,255,255,.7);
  border: 1px solid transparent; border-radius: 7px;
  padding: 6px 12px; font-size: .82rem; cursor: pointer;
  font-family: inherit; transition: all .15s ease;
}
#src-bar button:hover { color: #fff; background: rgba(255,255,255,.08); }
#src-bar button.active {
  background: rgba(255,255,255,.14); color: #fff;
  border-color: rgba(255,255,255,.2);
}

#iframe-wrap {
  position: fixed; inset: 0; display: none; background: #000;
}
#iframe-wrap iframe { width: 100%; height: 100%; border: 0; }

#usage {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  background: #000; gap: 10px;
}
#usage p { font-size: 1.05rem; color: rgba(255,255,255,.65); line-height: 2; }

#err {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; background: #000;
}
#err-title { font-size: 2.4rem; font-weight: 700; color: #fff; margin-bottom: 18px; }
#err-link { font-size: 1.1rem; color: #60a5fa; text-decoration: underline; cursor: pointer; }
#err-link:hover { color: #93c5fd; }
#err-detail {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  font-size: .78rem; color: rgba(255,255,255,.35); white-space: nowrap;
  max-width: 90vw; overflow: hidden; text-overflow: ellipsis;
}
</style>
</head>
<body>

<div id="loader">
  <div id="loader-bg"></div>
  <div class="spinner"></div>
  <div id="loader-text">Loading stream...</div>
</div>

<div id="usage">
  <p>
    <span style="color:#fff;font-size:1.2rem">Stream</span><br><br>
    <code style="color:rgba(255,255,255,.8)">?id=550</code> &nbsp;— movie<br>
    <code style="color:rgba(255,255,255,.8)">?id=456&amp;s=1&amp;e=1</code> &nbsp;— TV episode
  </p>
</div>

<div id="err">
  <div id="err-title">Error Occurred</div>
  <a id="err-link" href="#">Try vidsrc.xyz instead?</a>
  <div id="err-detail"></div>
</div>

<div id="player">
  <video id="v" controls autoplay playsinline></video>
</div>

<div id="src-bar">
  <button data-src="vidlink" class="active">Vidlink</button>
  <button data-src="vidsrc">vidsrc.to</button>
</div>

<div id="iframe-wrap">
  <iframe id="vframe" allowfullscreen allow="autoplay; encrypted-media; fullscreen"></iframe>
</div>

<script>
var TMDB_KEY = '3a73619bbb8fc6d47742d1b5b2b707b5';

var MESSAGES = [
  'Loading stream...', 'Contacting the mothership...', 'Bribing the servers...',
  'Untangling the cables...', 'Asking nicely...', 'Decoding the matrix...',
  'Warming up the hamsters...', 'Negotiating with the cloud...', 'Almost there...',
  'Convincing pixels to move...', 'Poking the API...', 'Summoning bandwidth...',
  'Greasing the pipes...', 'Waking up the interns...', 'Stealing the stream (legally)...'
];
var msgEl = document.getElementById('loader-text');
var msgIdx = 0;
var msgTimer = setInterval(function() {
  msgIdx = (msgIdx + 1) % MESSAGES.length;
  msgEl.textContent = MESSAGES[msgIdx];
}, 2200);

var p = new URLSearchParams(location.search);
var id = p.get('id'), s = p.get('s'), e = p.get('e');
var imdbId = null;       // fetched from TMDB, used by vidsrc.to
var currentSrc = 'vidlink';
var vidlinkResult = null; // cached /api response so switching back is instant

function showPlayer() {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('src-bar').style.display = 'flex';
  if (currentSrc === 'vidsrc') {
    document.getElementById('player').style.display = 'none';
    document.getElementById('iframe-wrap').style.display = 'block';
  } else {
    document.getElementById('iframe-wrap').style.display = 'none';
    document.getElementById('player').style.display = 'block';
  }
}

function showErr(msg) {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('err').style.display = 'flex';
  document.getElementById('err-detail').textContent = msg || '';
  var vidsrcUrl = s
    ? 'https://vidsrc.xyz/embed/tv?tmdb=' + id + '&season=' + s + '&episode=' + (e || '1')
    : 'https://vidsrc.xyz/embed/movie?tmdb=' + id;
  document.getElementById('err-link').href = vidsrcUrl;
}

function vidsrcToUrl() {
  // vidsrc.to prefers IMDb IDs but falls back to TMDB via the same endpoint.
  var key = imdbId || id;
  if (s) {
    return 'https://vidsrc.to/embed/tv/' + key + '/' + s + '/' + (e || '1');
  }
  return 'https://vidsrc.to/embed/movie/' + key;
}

function playVidsrc() {
  currentSrc = 'vidsrc';
  var f = document.getElementById('vframe');
  f.src = vidsrcToUrl();
  showPlayer();
}

function playVidlink() {
  currentSrc = 'vidlink';
  var v = document.getElementById('v');
  // Reset any previous source so canplay fires again on switch-back.
  v.removeAttribute('src'); v.load();
  if (!vidlinkResult) { showErr('Vidlink source unavailable'); return; }
  play(vidlinkResult.url, vidlinkResult.direct || vidlinkResult.url);
}

document.getElementById('src-bar').addEventListener('click', function(ev) {
  var btn = ev.target.closest('button[data-src]'); if (!btn) return;
  if (btn.dataset.src === currentSrc) return;
  document.querySelectorAll('#src-bar button').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  if (btn.dataset.src === 'vidsrc') playVidsrc(); else playVidlink();
});

function loadBackdrop(id, isTv) {
  var type = isTv ? 'tv' : 'movie';
  fetch('https://api.themoviedb.org/3/' + type + '/' + id + '?api_key=' + TMDB_KEY + '&append_to_response=external_ids')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.external_ids && d.external_ids.imdb_id) imdbId = d.external_ids.imdb_id;
      var img = d.backdrop_path || d.poster_path;
      if (!img) return;
      var url = 'https://wsrv.nl/?url=' + encodeURIComponent('https://image.tmdb.org/t/p/w1280' + img) + '&bg=black&blur=3';
      var bg = document.getElementById('loader-bg');
      var preload = new Image();
      preload.onload = function() { bg.style.backgroundImage = 'url(' + url + ')'; bg.style.opacity = '1'; };
      preload.src = url;
    })
    .catch(function() {});
}

if (!id) {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('usage').style.display = 'flex';
} else {
  // ?src=vidsrc bootstraps directly into the iframe source.
  var bootSrc = p.get('src') === 'vidsrc' ? 'vidsrc' : 'vidlink';
  loadBackdrop(id, !!s);

  if (bootSrc === 'vidsrc') {
    // Mark the bar active for vidsrc, then play it (imdbId may still be
    // loading in the background — vidsrc.to falls back to TMDB id).
    document.querySelectorAll('#src-bar button').forEach(function(b) {
      b.classList.toggle('active', b.dataset.src === 'vidsrc');
    });
    playVidsrc();
  } else {
    var api = '/api?' + (s ? 'id='+id+'&s='+s+'&e='+(e||'1') : 'id='+id);
    fetch(api)
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) {
          // Vidlink failed — auto-fallback to vidsrc.to instead of the error screen.
          vidlinkResult = null;
          document.querySelectorAll('#src-bar button').forEach(function(b) {
            b.classList.toggle('active', b.dataset.src === 'vidsrc');
          });
          return playVidsrc();
        }
        vidlinkResult = d;
        play(d.url, d.direct || d.url);
      })
      .catch(function() {
        // Network/API failure — also fall back to vidsrc.to.
        document.querySelectorAll('#src-bar button').forEach(function(b) {
          b.classList.toggle('active', b.dataset.src === 'vidsrc');
        });
        playVidsrc();
      });
  }
}

function play(src, directUrl) {
  // src is already a proxied /server?url=... link — use it as-is.
  var v = document.getElementById('v');
  var isHlsStream = /\.m3u8?(\?|$)/i.test(String(directUrl).split('?')[0]);

  if (isHlsStream && Hls.isSupported()) {
    var hls = new Hls({ enableWorker: true });
    hls.loadSource(src);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      showPlayer();
      v.play().catch(function(){});
    });
    hls.on(Hls.Events.ERROR, function(_, d) {
      if (d.fatal) showErr(d.details || 'HLS fatal error');
    });
  } else {
    // mp4 (or native-HLS browsers like Safari): play directly through the
    // /server CDN proxy, which supports Range requests for seeking.
    v.src = src;
    v.addEventListener('canplay', showPlayer, { once: true });
    v.addEventListener('error', function() {
      showErr('Video failed to load' + (v.error ? ' (code ' + v.error.code + ')' : ''));
    }, { once: true });
    v.play().catch(function(){});
  }
}
</script>
</body>
</html>
